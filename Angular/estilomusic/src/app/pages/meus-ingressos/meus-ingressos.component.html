<div class="container mt-5">
  <h2 class="mb-4 text-primary">Meus Ingressos</h2>

  <div class="row">
    <div *ngFor="let item of meusIngressos()" class="col-md-4 mb-4">
      <div class="card h-100 border-0 shadow-sm hover-shadow">
        <img [src]="item.imagem" class="card-img-top" style="height:200px; object-fit:cover;" alt="{{ item.titulo }}">
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ item.titulo }}</h5>
          <p class="card-text text-muted mb-1">
            <i class="bi bi-calendar"></i> {{ item.data | date:'dd/MM/yyyy' }}
          </p>
          <p class="card-text text-muted">
            <i class="bi bi-geo-alt"></i> {{ item.local }}
          </p>
          <hr>
          <p class="small text-secondary">{{ item.descricao }}</p>
        </div>
      </div>
    </div>

    <div *ngIf="meusIngressos().length === 0" class="text-center p-5">
      <p class="lead">Você ainda não adquiriu nenhum ingresso.</p>
    </div>
  </div>
</div>
