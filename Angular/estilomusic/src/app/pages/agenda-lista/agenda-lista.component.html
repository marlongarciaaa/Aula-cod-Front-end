<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="text-primary fw-bold">📅 Agenda de Eventos 2026</h1>
    <a routerLink="/novo-evento" class="btn btn-success">+ Sugerir Evento</a>
  </div>

  <div class="row">
    @for (item of eventos(); track item.id) {
      <div class="col-md-4 mb-4">
        <div class="card h-100 border-0 shadow-sm hover-shadow">
          <div class="card-body">
            <span class="badge bg-info text-dark mb-2">Evento Confirmado</span>
            <h5 class="card-title fw-bold">{{ item.titulo }}</h5>
            <p class="card-text text-muted mb-1">
              <i class="bi bi-calendar"></i> {{ item.data | date:'dd/MM/yyyy' }}
            </p>
            <p class="card-text text-muted">
              <i class="bi bi-geo-alt"></i> {{ item.local }}
            </p>
            <hr>
            <p class="small text-secondary">{{ item.descricao }}</p>
          </div>
          <div class="card-footer bg-white border-0 pb-3">
            <button class="btn btn-outline-primary w-100">Ver Detalhes</button>
          </div>
        </div>
      </div>
    } @empty {
      <div class="text-center p-5">
        <p class="lead">Nenhum evento agendado para o momento.</p>
      </div>
    }
  </div>
</div>
